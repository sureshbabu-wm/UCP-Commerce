<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>UCP Commerce Assistant</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9ff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .action-card {
            box-shadow: 0px 4px 20px rgba(15, 23, 42, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d3e4fe;
            border-radius: 10px;
        }
        
        /* Slide-up animations for messages */
        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

            <button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity cursor-pointer active:scale-95">account_circle</button>
        </div>

    <!-- Main Content Area -->
    <main class="flex-1 mt-16 pb-36 pt-8 flex flex-col justify-between">
        <!-- Interactive UI Views -->
        <div class="chat-container px-margin-mobile w-full">
            
            <!-- Chat View Feed (Unified & Grounded) -->
            <div id="chat-feed" class="space-y-8 flex flex-col">
                <!-- Initial User Message -->
                <div class="flex justify-end w-full slide-up">
                    <div class="max-w-[80%] bg-surface-container-low rounded-xl px-4 py-3 border border-outline-variant/30">
                        <p class="font-body-lg text-on-surface-variant">I want running shoes under $150</p>
                    </div>
                </div>

                <!-- Available Offers Card -->
                <div id="offers-card" class="flex justify-start w-full slide-up">
                    <div class="max-w-[90%] w-full bg-surface-container-lowest border border-outline-variant rounded-lg action-card overflow-hidden">
                        <div class="px-4 py-3 border-b border-outline-variant bg-surface-container-lowest">
                            <h3 class="font-headline-sm text-headline-sm text-on-background">Available Offers</h3>
                        </div>

                        <!-- Product Grid/Deck -->
                        <div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4" id="offers-grid">
                            <!-- JS will inject the products based on layout here -->
                        </div>
                    </div>
                </div>

                <!-- Dynamic container where checkout steps are injected -->
                <div id="checkout-steps" class="space-y-8 flex flex-col"></div>
            </div>


        </div>
    </main>

    <!-- Fixed Composer Footer -->
    <footer class="fixed bottom-0 w-full bg-background/80 backdrop-blur-md border-t border-outline-variant z-50 py-4 px-margin-mobile">
        <div class="chat-container">
            <div class="relative flex items-center bg-surface-container-lowest border border-outline rounded-xl p-1 shadow-sm focus-within:border-primary transition-colors">
                <textarea id="chat-input" class="w-full bg-transparent border-none focus:ring-0 py-3 px-4 font-body-lg resize-none" placeholder="Message Assistant..." rows="1" onkeydown="handleTextareaKeydown(event)"></textarea>
                <div class="flex items-center gap-2 pr-2">
                    <button class="material-symbols-outlined text-outline hover:text-on-surface transition-colors" title="Attach file">attach_file</button>
                    <button onclick="handleSendMessage()" class="bg-primary text-on-primary w-10 h-10 rounded-lg flex items-center justify-center active:scale-95 transition-transform" title="Send message">
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </div>
            </div>
            <p class="text-center text-outline font-label-caps text-[10px] mt-2 opacity-60">UCP Commerce Assistant uses AI to facilitate transactions. Verify details before finalizing.</p>
        </div>
    </footer>

    <!-- App Logic Script -->
    <script src="app.js"></script>
